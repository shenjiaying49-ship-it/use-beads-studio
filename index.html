<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拼豆图纸生成器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">Fuse Beads Studio</p>
          <h1>拼豆图纸工作台</h1>
          <p class="lede">
            上传图片后自动转成可打印的编号网格，并按照大区块红线、坐标头和底部色号统计展示。
          </p>
        </div>

        <section class="card controls-card">
          <div class="card-head">
            <h2>图片与裁切</h2>
            <span id="fileMeta">未选择图片</span>
          </div>

          <label class="upload-field" for="blueprint">
            <span>上传图片</span>
            <input type="file" accept="image/*" id="blueprint" />
          </label>

          <div class="field-group">
            <label class="field">
              <span>目标总颗数</span>
              <div class="inline-field">
                <input type="range" id="scale" min="0.2" max="1" step="0.05" value="1" />
                <strong id="scaleValue">100% 基准</strong>
              </div>
            </label>
          </div>

          <div class="field-group crop-section">
            <div class="section-title-row">
              <span>裁剪区域</span>
              <button type="button" id="autoCrop" class="secondary-button">自动裁剪</button>
            </div>
            <div class="crop-grid">
              <label>
                <span>左</span>
                <input type="range" id="cropX" min="0" max="1" step="0.01" value="0" />
                <strong id="cropXLabel">0%</strong>
              </label>
              <label>
                <span>上</span>
                <input type="range" id="cropY" min="0" max="1" step="0.01" value="0" />
                <strong id="cropYLabel">0%</strong>
              </label>
              <label>
                <span>宽</span>
                <input type="range" id="cropW" min="0.1" max="1" step="0.01" value="1" />
                <strong id="cropWLabel">100%</strong>
              </label>
              <label>
                <span>高</span>
                <input type="range" id="cropH" min="0.1" max="1" step="0.01" value="1" />
                <strong id="cropHLabel">100%</strong>
              </label>
            </div>
          </div>

          <div class="field-group stats-grid">
            <div class="stat-box">
              <span>成品尺寸</span>
              <strong id="dimensions">等待上传</strong>
            </div>
            <div class="stat-box">
              <span>总颗数</span>
              <strong id="pixelCount">0</strong>
            </div>
            <div class="stat-box">
              <span>色号数</span>
              <strong id="paletteSize">0</strong>
            </div>
            <div class="stat-box">
              <span>状态</span>
              <strong id="statusText">请先上传图片</strong>
            </div>
          </div>

          <button id="download" disabled>下载图纸 PNG</button>
        </section>
      </aside>

      <main class="workspace">
        <section class="workspace-panel sheet-panel">
          <div class="panel-toolbar">
            <div>
              <p class="panel-kicker">Pattern Sheet</p>
              <h2>编号拼豆图纸</h2>
            </div>
            <div class="toolbar-meta">
              <span>大区块每 10 格标线</span>
              <span>坐标头已启用</span>
            </div>
          </div>

          <div class="page-controls">
            <button type="button" id="prevPage" class="secondary-button" disabled>上一页</button>
            <button type="button" id="nextPage" class="secondary-button" disabled>下一页</button>
          </div>

          <div class="canvas-stage">
            <div class="page-badge" id="pageBadge">1/1</div>
            <canvas id="preview" aria-label="拼豆预览"></canvas>
          </div>

          <div id="paletteLegend" class="palette-legend empty">
            <span>上传图片后将在这里显示色号统计</span>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
